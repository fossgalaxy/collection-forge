---
# drop-in support for an nginx proxy

- name: nginx | Ensure the vhost template exists
  become: true
  ansible.builtin.template:
    mode: '0600'
    src: vhost.j2
    dest: "{{ fg_forgejo_nginx_conf }}"
  when: "fg_forgejo_nginx"

- name: nginx | Ensure the vhost does not exist
  become: true
  ansible.builtin.template:
    path: "{{ fg_forgejo_nginx_conf }}"
    state: absent
  when: "not fg_forgejo_nginx"
