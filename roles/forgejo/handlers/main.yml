---
# handlers file for forgejo

- name: "Restart Forgejo"
  become: true
  ansible.builtin.service:
    name: "{{ forgejo_service }}"
    state: restarted

- name: "Reload Forgejo"
  become: true
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: "{{ forgejo_service }}"
    state: restarted
